version = 1
[common]
# API mode, set to true to prevent loading local subscriptions or serving local files directly
api_mode = false

# Access token used for performing critical action through Web interface
api_access_token = "si"

# Default URLs, used when no URL is provided in request, use "|" to separate multiple subscription links, supports local files/URL
default_url = []

# Insert subscription links to requests. Can be used to add node(s) to all exported subscriptions.
enable_insert = true
# URLs to insert before subscription links, can be used to add node(s) to all exported subscriptions, supports local files/URL
insert_url = [""]
# Prepend inserted URLs to subscription links. Nodes in insert_url will be added to groups first with non-group-specific match pattern.
prepend_insert_url = true

# Exclude nodes which remarks match the following patterns. Supports regular expression.
exclude_remarks = ["(到期|剩余流量|时间|官网|产品|域名|访问|失联|邮箱)"]

# Only include nodes which remarks match the following patterns. Supports regular expression.
#include_remarks = ["V3.*港"]

# Enable script support for filtering nodes
enable_filter = false
# Script used for filtering nodes. Supports inline script and script path. A "filter" function with 1 argument which is a node should be defined in the script.
# Example: Inline script: Set value to content of script.
#          Script path: Set value to "path:/path/to/script.js".
#filter_script = '''
#function filter(node) {
#    const info = JSON.parse(node.ProxyInfo);
#    if(info.EncryptMethod.includes('chacha20'))
#	    return true;
#    return false;
#}
#'''

# Setting an external config file as default when none is specified, supports local files/URL
# default_external_config = "config/example_external_config.toml"

# The file scope limit of the 'rule_base' options in external configs.
base_path = "base"

# Clash config base used by the generator, supports local files/URL
clash_rule_base = "base/all_base.tpl"

# Surge config base used by the generator, supports local files/URL
surge_rule_base = "base/all_base.tpl"

# Surfboard config base used by the generator, supports local files/URL
surfboard_rule_base = "base/all_base.tpl"

# Mellow config base used by the generator, supports local files/URL
mellow_rule_base = "base/all_base.tpl"

# Quantumult config base used by the generator, supports local files/URL
quan_rule_base = "base/all_base.tpl"

# Quantumult X config base used by the generator, supports local files/URL
quanx_rule_base = "base/all_base.tpl"

# Loon config base used by the generator, supports local files/URL
loon_rule_base = "base/all_base.tpl"

# Shadowsocks Android config base used by the generator, supports local files/URL
sssub_rule_base = "base/all_base.tpl"

# sing-box config base used by the generator, supports local files/URL
singbox_rule_base = "base/all_base.tpl"

# Proxy used to download rulesets or subscriptions, set to NONE or empty to disable it, set to SYSTEM to use system proxy.
# Accept cURL-supported proxies (http:// https:// socks4a:// socks5://)

proxy_config = "SYSTEM"
proxy_ruleset = "SYSTEM"
proxy_subscription = "NONE"

# Append a proxy type string ([SS] [SSR] [VMess]) to node remark.
append_proxy_type = false

# When requesting /sub, reload this config file first.
reload_conf_on_request = false

[[userinfo.stream_rule]]
# Rules to extract stream data from node
# Format: full_match_regex|new_format_regex
# where new_format_regex should be like "total=$1&left=$2&used=$3"
match = '^剩余流量：(.*?)\|总流量：(.*)$'
replace = 'total=$2&left=$1'

[[userinfo.stream_rule]]
match = '^剩余流量：(.*?) (.*)$'
replace = 'total=$1&left=$2'

[[userinfo.stream_rule]]
match = '^Bandwidth: (.*?)/(.*)$'
replace = 'used=$1&total=$2'

[[userinfo.stream_rule]]
match = '^.*剩余(.*?)(?:\s*?)@(?:.*)$'
replace = 'total=$1'

[[userinfo.time_rule]]
# Rules to extract expire time data from node
# Format: full_match_regex|new_format_regex
# where new_format_regex should follow this example: yyyy:mm:dd:hh:mm:ss
match = '^过期时间：(\d+)-(\d+)-(\d+) (\d+):(\d+):(\d+)$'
replace = '$1:$2:$3:$4:$5:$6'

[[userinfo.time_rule]]
match = '^到期时间:(\d+)-(\d+)-(\d+)$'
replace = '$1:$2:$3:0:0:0'

[[userinfo.time_rule]]
match = '^Smart Access expire: (\d+)/(\d+)/(\d+)$'
replace = '$1:$2:$3:0:0:0'

[node_pref]
#udp_flag = false
#tcp_fast_open_flag = false
#skip_cert_verify_flag = false
#tls13_flag = false

sort_flag = false
# Script used for sorting nodes. A "compare" function with 2 arguments which are the 2 nodes to be compared should be defined in the script. Supports inline script and script path.
# Examples can be seen at the filter_script option in [common] section.
sort_script = '''
function extractNodeName(remark) {
    // 通过空格分割，取最后一位来去除emoji和其他前缀
    const parts = remark.trim().split(/\s+/);
    return parts[parts.length - 1];
}

function removeLeadingFlagEmoji(text) {
    // 去掉开头的国旗emoji（由两个区域指示符字母组成）及其后的空格
    return text.replace(/^(\uD83C[\uDDE6-\uDDFF]\uD83C[\uDDE6-\uDDFF]\s*)/, '').trim();
}

function hasBrackets(text) {
    // 检查去掉开头emoji后是否以【开头（即带有供应商前缀）
    return removeLeadingFlagEmoji(text).startsWith('【');
}

function extractBracketText(text) {
    // 提取【】中的内容，没有则返回空字符串
    const match = removeLeadingFlagEmoji(text).match(/^【([^】]+)】/);
    return match ? match[1] : '';
}

function extractLeadingFlagEmoji(text) {
    // 提取开头国旗emoji（由两个区域指示符字母组成），没有则返回空字符串
    const match = text.trim().match(/^(\uD83C[\uDDE6-\uDDFF]\uD83C[\uDDE6-\uDDFF])/);
    return match ? match[1] : '';
}

function extractFirstNumberText(text) {
    // 提取节点名中的第一个数字段，用于同一个旗帜内排序
    const name = removeLeadingFlagEmoji(text).replace(/^【[^】]+】\s*/, '');
    const match = name.match(/\d+/);
    return match ? match[0] : '';
}

function isChinese(text) {
    // 简单检查字符串是否包含汉字，这里假设汉字编码范围主要在\u4e00到\u9fff之间
    return /[\u4e00-\u9fff]/.test(text);
}

function containsDownload(text) {
    // 检查字符串是否包含"下载"两个字
    return text.includes("下载");
}

function containsBei(text) {
    // 检查字符串是否包含"备用"两个字
    return text.includes("备用");
}

// 【新增】提取备用等级数字，如果没有数字则返回 0
function getBeiLevel(text) {
    const match = text.match(/【备用(\d+)】/);
    if (match) {
        return parseInt(match[1], 10);
    }
    // 如果包含“备用”字样但没数字（防止漏网），视为最大等级或按需处理，这里暂定为0
    return 0;
}

function compareText(a, b) {
    // 明确逐字符比较，避免不同 JS 引擎/系统 locale 对中文 localeCompare 的结果不一致
    // 使用迭代实现，效果等同于从左到右递归比较每一个字符，但没有递归栈风险
    const aChars = Array.from(a.toLowerCase());
    const bChars = Array.from(b.toLowerCase());
    const maxLength = Math.max(aChars.length, bChars.length);

    for (let i = 0; i < maxLength; i++) {
        const aChar = aChars[i] || '';
        const bChar = bChars[i] || '';

        if (aChar === bChar) {
            continue;
        }
        if (aChar === '') {
            return -1;
        }
        if (bChar === '') {
            return 1;
        }

        return aChar.codePointAt(0) - bChar.codePointAt(0);
    }

    return 0;
}

function compareNumberText(a, b) {
    // 数字段按数值大小比较，不用 parseInt，避免超长数字精度问题
    const normalizedA = a.replace(/^0+/, '') || '0';
    const normalizedB = b.replace(/^0+/, '') || '0';

    if (normalizedA.length !== normalizedB.length) {
        return normalizedA.length - normalizedB.length;
    }

    return compareText(normalizedA, normalizedB);
}

function compareMixedText(a, b) {
    // 数字段按数值排序，非数字段按字符逐个比较
    const regex = /(\d+|\D+)/g;
    const aParts = a.match(regex) || [];
    const bParts = b.match(regex) || [];
    const maxLength = Math.max(aParts.length, bParts.length);

    for (let i = 0; i < maxLength; i++) {
        const aPart = aParts[i] || '';
        const bPart = bParts[i] || '';

        if (aPart === '') {
            return -1;
        }
        if (bPart === '') {
            return 1;
        }

        const aIsNumber = /^\d+$/.test(aPart);
        const bIsNumber = /^\d+$/.test(bPart);
        const diff = aIsNumber && bIsNumber
            ? compareNumberText(aPart, bPart)
            : compareText(aPart, bPart);

        if (diff !== 0) {
            return diff;
        }
    }

    return 0;
}

function compare(node_a, node_b) {
    // 提取处理后的节点名称
    const remarkA_Full = node_a.Remark;
    const remarkB_Full = node_b.Remark;

    // 1. 备用节点优先级最低（排在最后）
    // 这里结合了正则提取的等级和简单的文字包含判断
    const levelA = getBeiLevel(remarkA_Full);
    const levelB = getBeiLevel(remarkB_Full);
    const isBeiA = levelA > 0 || containsBei(remarkA_Full);
    const isBeiB = levelB > 0 || containsBei(remarkB_Full);

    if (isBeiA !== isBeiB) {
        return isBeiA ? false : true; // A是备用则排后面(false)，否则排前面(true)
    }

    // 2. 【新增关键逻辑】如果都是备用节点，按数字等级从小到大排序 (1 -> 2 -> 3)
    // 这一步必须在“中英文排序”之前执行
    if (isBeiA && isBeiB) {
        if (levelA !== levelB) {
            return levelA < levelB; // 等级小的在前 (1 在 3 前)
        }
    }

    // 2. 包含"下载"的节点次后
    const aContainsDownload = containsDownload(remarkA_Full);
    const bContainsDownload = containsDownload(remarkB_Full);

    if (aContainsDownload !== bContainsDownload) {
        return aContainsDownload ? false : true; // 包含下载的排在后面，返回false表示a在后
    }

    // 3. 不带【】前缀的节点排在前面（优先于带【】前缀的）
    const aHasBrackets = hasBrackets(remarkA_Full);
    const bHasBrackets = hasBrackets(remarkB_Full);

    if (aHasBrackets !== bHasBrackets) {
        return aHasBrackets ? false : true; // A带【】则排后面，不带则排前面
    }

    // 4. 按【】中的内容排序
    const bracketA = extractBracketText(remarkA_Full);
    const bracketB = extractBracketText(remarkB_Full);
    const bracketCompare = compareMixedText(bracketA, bracketB);
    if (bracketCompare !== 0) {
        return bracketCompare < 0;
    }

    // 5. 按旗帜排序，让同一个旗帜的节点聚在一起
    const flagA = extractLeadingFlagEmoji(remarkA_Full);
    const flagB = extractLeadingFlagEmoji(remarkB_Full);
    const flagCompare = compareText(flagA, flagB);
    if (flagCompare !== 0) {
        return flagCompare < 0;
    }

    // 6. 同一个旗帜内，按提取到的第一个数字大小排序
    const numberA = extractFirstNumberText(remarkA_Full);
    const numberB = extractFirstNumberText(remarkB_Full);
    if (numberA !== '' || numberB !== '') {
        if (numberA === '') {
            return false;
        }
        if (numberB === '') {
            return true;
        }

        const numberCompare = compareNumberText(numberA, numberB);
        if (numberCompare !== 0) {
            return numberCompare < 0;
        }
    }

    // 7. 剩余完全同级的节点按完整名称兜底排序，保证比较稳定
    const sortResult = compareMixedText(removeLeadingFlagEmoji(remarkA_Full), removeLeadingFlagEmoji(remarkB_Full));
    if (sortResult < 0) {
        return true; // a应该在前面
    } else if (sortResult > 0) {
        return false; // a应该在后面
    } else {
        return false; // 相等时返回false，满足排序器的严格比较要求并保持稳定排序
    }
}
'''

filter_deprecated_nodes = false
append_sub_userinfo = true
clash_use_new_field_name = true

# Generate style of the proxies and proxy groups section of Clash subscriptions.
# Supported styles: block, flow, compact
# Block: - name: name1    Flow: - {name: name1, key: value}    Compact: [{name: name1, key: value},{name: name2, key: value}]
#         key: value           - {name: name2, key: value}
#       - name: name2
#         key: value
clash_proxies_style = "flow"
clash_proxy_groups_style = "block"

# add Clash mode to sing-box rules, and add a GLOBAL group to end of outbounds
singbox_add_clash_modes = true

[[node_pref.rename_node]]
match = '\(?((x|X)?(\d+)(\.?\d+)?)((\s?倍率?)|(x|X))\)?'
replace = "$1x"

import = "snippets/rename_node.toml"

[managed_config]
# Append a '#!MANAGED-CONFIG' info to Surge configurations
write_managed_config = true

# Address prefix for MANAGED-CONFIG info, without the trailing "/".
managed_config_prefix = "https://subconverter.xiaosi.cc"
#managed_config_prefix = "http://127.0.0.1:25500"
# managed_config_prefix = "http://10.18.96.99:25500"

# Managed config update interval in seconds, determine how long the config will be updated.
config_update_interval = 86400

# If config_update_strict is set to true, Surge will require a force update after the interval.
config_update_strict = false

# Device ID to be written to rewrite scripts for some version of Quantumult X 
quanx_device_id = ""

[surge_external_proxy]
#surge_ssr_path = "/usr/bin/ssr-local"
resolve_hostname = true

[emojis]
add_emoji = true
remove_old_emoji = true

[[emojis.emoji]]
#match = '(流量|时间|应急)'
#emoji = '🏳️‍🌈'
import = "snippets/emoji.toml"

[[custom_groups]]
import = "snippets/groups.toml"

